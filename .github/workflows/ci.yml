name: CI/CD System Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies with PNPM policy
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript validation
        run: pnpm exec tsc --noEmit

      - name: Run Vite production build check
        run: pnpm run build:electron

      - name: Run Vitest Unit & Integration tests
        run: pnpm run test
